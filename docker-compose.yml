services:
  postgres:
    image: postgres:17
    container_name: chessriend-db
    environment:
      POSTGRES_DB: chessriend
      POSTGRES_USER: chessriend
      POSTGRES_PASSWORD: chessriend
    ports:
      - "5432:5432"
    volumes:
      - chessriend-data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: chessriend-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.0.1
    container_name: chessriend-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  chessriend-data:
  prometheus-data:
  grafana-data:
