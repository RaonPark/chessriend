spring:
  application:
    name: chessriend

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/chessriend
    username: chessriend
    password: chessriend

  flyway:
    url: jdbc:postgresql://localhost:5432/chessriend
    user: chessriend
    password: chessriend
    locations: classpath:db/migration

lichess:
  api:
    base-url: https://lichess.org
    token: ${LICHESS_API_TOKEN:}

chesscom:
  api:
    base-url: https://api.chess.com
    user-agent: Chessriend/1.0

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
