spring:
  application:
    name: chessriend

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/chessriend
    username: chessriend
    password: chessriend

  flyway:
    url: jdbc:postgresql://localhost:5432/chessriend
    user: chessriend
    password: chessriend
    locations: classpath:db/migration

lichess:
  api:
    base-url: https://lichess.org
    token: ${LICHESS_API_TOKEN:}

chesscom:
  api:
    base-url: https://api.chess.com
    user-agent: Chessriend/1.0

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

logging:
  pattern:
    correlation: "[${spring.application.name:},%mdc{traceId:-},%mdc{spanId:-}] "
